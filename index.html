<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Portal Conquest</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app-shell" aria-live="polite">
      <div id="game-container" aria-label="Phaser game canvas mount point"></div>
      <div id="map-vignette" aria-hidden="true"></div>

      <div id="ui-overlay" data-mode="map" aria-label="Game UI overlay">
        <header class="top-bar" aria-label="Global controls">
          <div class="top-bar__status" aria-label="Run status">
            <span class="status-chip">Turn 0</span>
            <span class="status-chip">HP 100</span>
            <span class="status-chip">Lv 1</span>
            <button class="ui-btn" type="button" data-action="toggle-debug" data-debug-enabled="false">Debug OFF</button>
            <button class="ui-btn ui-btn--icon" type="button" aria-label="Settings" data-action="settings">⚙</button>
          </div>
        </header>

        <section id="map-debug-panel" aria-label="Map debug panel" aria-hidden="true" hidden>
          <p class="map-debug-panel__line" data-debug-field="hint"></p>
          <p class="map-debug-panel__line" data-debug-field="status"></p>
          <p class="map-debug-panel__line" data-debug-field="node"></p>
        </section>

        <section id="context-panel" aria-label="Context panel" aria-hidden="true" data-open="false" data-view="context">
          <div class="context-panel__handle" aria-hidden="true"></div>
          <div class="context-panel__content" data-panel-content="hero" hidden>
            <h2>Hero</h2>
            <p>Hero / army panel coming soon.</p>
            <div class="panel-actions">
              <button class="ui-btn ui-btn--primary" type="button" data-action="close-panel">Close</button>
            </div>
          </div>

          <div class="context-panel__content" data-panel-content="map" hidden></div>

          <div class="context-panel__content" data-panel-content="castle" hidden>
            <h2>Castle Actions</h2>
            <div class="panel-actions">
              <button class="ui-btn" type="button" data-action="context" data-context-action="build">Build</button>
              <button class="ui-btn" type="button" data-action="context" data-context-action="leave">Leave</button>
              <button class="ui-btn ui-btn--primary" type="button" data-action="close-panel">Close</button>
            </div>
          </div>
        </section>

        <nav class="bottom-mode-bar" aria-label="Mode switcher">
          <button class="mode-btn is-active" type="button" data-action="set-mode" data-mode="map">Map</button>
          <button class="mode-btn" type="button" data-action="set-mode" data-mode="hero">Hero</button>
          <button class="mode-btn" type="button" data-action="set-mode" data-mode="castle">Castle</button>
        </nav>
      </div>

      <div id="rotate-overlay" role="alert" aria-live="assertive" aria-hidden="true">
        <p>Rotate device to play</p>
      </div>
    </div>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
