<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Portal Conquest</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app-shell" aria-live="polite">
      <div id="game-container" aria-label="Phaser game canvas mount point"></div>

      <div id="ui-overlay" data-mode="map" aria-label="Game UI overlay">
        <header class="top-bar" aria-label="Global controls">
          <div class="top-bar__status" aria-label="Run status">
            <span class="status-chip">Turn 0</span>
            <span class="status-chip">HP 100</span>
            <span class="status-chip">Lv 1</span>
            <button class="ui-btn ui-btn--icon" type="button" aria-label="Settings" data-action="settings">⚙</button>
          </div>
        </header>

        <section id="context-panel" aria-label="Context panel" aria-hidden="true" data-open="false" data-view="context">
          <div class="context-panel__handle" aria-hidden="true"></div>
          <div class="context-panel__content" data-panel-content="objectives" hidden>
            <h2>Objectives</h2>
            <p>Objectives coming soon.</p>
            <div class="panel-actions">
              <button class="ui-btn ui-btn--primary" type="button" data-action="close-panel">Close</button>
            </div>
          </div>

          <div class="context-panel__content" data-panel-content="map">
            <h2>Map Actions</h2>
            <div class="panel-actions">
              <button class="ui-btn" type="button" data-action="context" data-context-action="inspect">Inspect</button>
              <button class="ui-btn" type="button" data-action="context" data-context-action="move">Move</button>
              <button class="ui-btn" type="button" data-action="start-battle">Engage</button>
              <button class="ui-btn ui-btn--primary" type="button" data-action="close-panel">Close</button>
            </div>
          </div>

          <div class="context-panel__content" data-panel-content="castle" hidden>
            <h2>Castle Actions</h2>
            <div class="panel-actions">
              <button class="ui-btn" type="button" data-action="context" data-context-action="build">Build</button>
              <button class="ui-btn" type="button" data-action="context" data-context-action="leave">Leave</button>
              <button class="ui-btn ui-btn--primary" type="button" data-action="close-panel">Close</button>
            </div>
          </div>
        </section>

        <p class="hint-line">Tap a node to inspect.</p>

        <nav class="bottom-mode-bar" aria-label="Mode switcher">
          <button class="mode-btn is-active" type="button" data-action="set-mode" data-mode="map">Map</button>
          <button class="mode-btn" type="button" data-action="set-mode" data-mode="objectives">Objectives</button>
          <button class="mode-btn" type="button" data-action="set-mode" data-mode="castle">Castle</button>
        </nav>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
